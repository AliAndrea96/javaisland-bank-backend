spring:
  application:
    name: bank-backend

  # 💾 CONFIGURAZIONE DEL DATABASE POSTGRESQL
  datasource:
    url: jdbc:postgresql://localhost:5432/javaisland_bank
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # 🛠️ CONFIGURAZIONE HIBERNATE / JPA
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      # 🔄 Svuota e ricrea le tabelle per evitare l'errore dei dati nulli vecchi
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # 🔐 CONFIGURAZIONE SICUREZZA OAUTH2 / KEYCLOAK
  security:
    oauth2:
      resourceserver:
        jwt:
          # Inseriamo l'URL del tuo Keycloak locale (modifica la porta o il realm se differiscono)
          issuer-uri: http://localhost:8080/realms/javaisland-realm

# 🔌 CONFIGURAZIONE DELLA PORTA DEL BACKEND TOMCAT
server:
  port: 8081